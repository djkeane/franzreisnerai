[security]
whitelist = ls,cat,du,ps,top,netstat,ping,curl,wget,git,docker,kubectl,systemctl
cpu_soft = 5
cpu_hard = 10
mem_limit_mb = 200
alert_webhook = https://hooks.slack.com/services/XXXXX/XXXXX/XXXXX

[ollama]
# Több endpoint is felvehető vesszővel elválasztva
# pl. http://localhost:11434,http://localhost:11435
url = http://localhost:11434,http://192.168.100.22:11434
default_model = franz-coder:latest
# lang_model: általános/magyar kérdésekhez (router 'lang' ág)
lang_model = jarvis-hu-coder:latest
fallback_models = qwen2.5-coder:1.5b,cronic:latest,gemma4:e2b-it-q4_K_M,jarvis-hu-coder:latest
timeout = 180
first_token_timeout = 60

[gemini]
model = gemini-1.5-flash

[agent]
max_tool_steps = 10
streaming = true
confirm_bash = false

[CodeAgent]
display_name = Code Agent
description = Python/Go/JS hibakeresés, bug fix, kód javítás
topic_prefix = code_
model = qwen2.5-coder:7b
temperature = 0.1

[DeveloperAgent]
display_name = Developer Agent
description = Python/Go/Node.js kód, Dockerfile, unit-test, Git
topic_prefix = dev_
model = jarvis-hu-coder:latest
temperature = 0.2

[DebugAgent]
display_name = Debug Agent
description = Log-elemzés, stack-trace, systemd, Docker/k8s debug
topic_prefix = debug_
model = jarvis-hu:latest
temperature = 0.1
